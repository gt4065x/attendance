<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance Check</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-btn:active { transform: scale(0.95); }
        .attendance-card { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <div class="max-w-2xl mx-auto px-4 py-10">
        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-slate-800">Student Attendance</h1>
            <p class="text-slate-500 mt-2">Manage daily attendance records in real-time</p>
        </header>

        <!-- Input Section -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-8 border border-slate-100">
            <div class="mb-5">
                <label for="studentName" class="block text-sm font-semibold text-slate-700 mb-2">Student Name</label>
                <input type="text" id="studentName" placeholder="Enter full name..." 
                    class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
            </div>
            
            <div class="grid grid-cols-3 gap-3">
                <button onclick="submitAttendance('Attendance')" class="status-btn bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-2 rounded-lg text-sm md:text-base">
                    Attendance
                </button>
                <button onclick="submitAttendance('Absence')" class="status-btn bg-rose-500 hover:bg-rose-600 text-white font-bold py-3 px-2 rounded-lg text-sm md:text-base">
                    Absence
                </button>
                <button onclick="submitAttendance('Tardiness')" class="status-btn bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 px-2 rounded-lg text-sm md:text-base">
                    Tardiness
                </button>
            </div>
        </div>

        <!-- Attendance Records List -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden border border-slate-100">
            <div class="px-6 py-4 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                <h2 class="text-lg font-bold text-slate-800">Recent Records</h2>
                <span id="recordCount" class="text-xs font-medium bg-blue-100 text-blue-700 px-2.5 py-0.5 rounded-full">0 entries</span>
            </div>
            <ul id="attendanceList" class="divide-y divide-slate-100 max-h-[500px] overflow-y-auto">
                <!-- Records will be injected here -->
                <li class="p-10 text-center text-slate-400 italic">No records found...</li>
            </ul>
        </div>
    </div>

    <!-- Firebase SDK (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 1. YOUR FIREBASE CONFIGURATION
        // Replace the values below with your actual project keys from Firebase Console
        const firebaseConfig = {
              apiKey: "AIzaSyA1X-mEdS9F_dkr5-lkB7IzPDfEVC22NhU",
  authDomain: "attendance-check-e4d68.firebaseapp.com",
  databaseURL: "https://attendance-check-e4d68-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "attendance-check-e4d68",
  storageBucket: "attendance-check-e4d68.firebasestorage.app",
  messagingSenderId: "488492989015",
  appId: "1:488492989015:web:335cf108fb899bf4e40112"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const attendanceCol = collection(db, "attendance");

        // UI Elements
        const studentInput = document.getElementById('studentName');
        const listContainer = document.getElementById('attendanceList');
        const countBadge = document.getElementById('recordCount');

        // Function to Submit Data
        window.submitAttendance = async (status) => {
            const name = studentInput.value.trim();
            if (!name) {
                alert("Please enter a student name.");
                return;
            }

            try {
                await addDoc(attendanceCol, {
                    name: name,
                    status: status,
                    timestamp: serverTimestamp()
                });
                studentInput.value = ""; // Clear input
            } catch (error) {
                console.error("Error adding document: ", error);
                alert("Error saving record. Check console for details.");
            }
        };

        // Real-time Listener to Display Data
        const q = query(attendanceCol, orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            listContainer.innerHTML = "";
            countBadge.innerText = `${snapshot.size} entries`;

            if (snapshot.empty) {
                listContainer.innerHTML = `<li class="p-10 text-center text-slate-400 italic">No records yet.</li>`;
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                const timeStr = data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleString() : "Syncing...";
                
                let statusColor = "text-slate-600";
                let bgColor = "bg-slate-100";
                
                if (data.status === 'Attendance') { statusColor = "text-emerald-700"; bgColor = "bg-emerald-50"; }
                if (data.status === 'Absence') { statusColor = "text-rose-700"; bgColor = "bg-rose-50"; }
                if (data.status === 'Tardiness') { statusColor = "text-amber-700"; bgColor = "bg-amber-50"; }

                const li = document.createElement('li');
                li.className = "p-4 attendance-card flex justify-between items-center hover:bg-slate-50";
                li.innerHTML = `
                    <div>
                        <p class="font-bold text-slate-800">${data.name}</p>
                        <p class="text-xs text-slate-400">${timeStr}</p>
                    </div>
                    <span class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider ${bgColor} ${statusColor}">
                        ${data.status}
                    </span>
                `;
                listContainer.appendChild(li);
            });
        });
    </script>
</body>
</html>
